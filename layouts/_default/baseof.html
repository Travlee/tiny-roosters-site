<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <main class="{{ if .IsHome }}home-main{{ end }}">
    {{ block "main" . }}{{ end }}
  </main>
  {{ if ne .Kind "404" }}
  <footer>
    {{ partial "footer.html" . }}
  </footer>
  {{ end }}
</body>
</html>
