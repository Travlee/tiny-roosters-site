{{ define "main" }}
  <h1>
    <span class="title-prefix"><a href="{{ .Parent.RelPermalink }}"><</a></span> {{ .Title }}
  </h1>

  <article class="list-content">{{ .Content }}</article>

  <div class="row-container">
    {{ range .Pages }}
      {{ $date_machine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
      {{ $date_human := .Date.Format "2006-01-02" }}

      <div class="row">
        <span class="row-arrow">→</span>
        <span class="row-time"><time datetime="{{ $date_machine }}">{{ $date_human }}</time></span>
        <a href="{{ .RelPermalink }}" class="row-title-link color-primary" title="{{ .Description | default .Summary }}">{{ .LinkTitle }}</a>
        <div class="row-desc">{{ .Description | default .Summary }}</div>
      </div>
    {{ end }}
  </div>
{{ end }}
