{{ $p := site.GetPage .file }}
{{ if $p }}
  {{ $date_machine := .date | time.Format "2006-01-02T15:04:05-07:00" }}
  {{ $date_human := .date | time.AsTime | time.Format "2006-01-02" }}

  <div class="row">
    <span class="row-arrow">↻</span>
    <span class="row-time"><time datetime="{{ $date_machine }}">{{ $date_human }}</time></span>
    <a href="{{ $p.RelPermalink }}" class="row-title-link color-primary" title="{{ $p.Description | default $p.Summary }}">
        {{ $p.LinkTitle }}
    </a>
    <div class="row-desc">
        {{ .msg }}
    </div>
  </div>
{{ end }}
