{{- $page := .page }}
{{- $menuID := .menuID }}

{{ with site.Menus.main }}
  <nav>
    {{ range . }}
      {{ if or ($page.IsMenuCurrent .Menu .) ($page.HasMenuCurrent .Menu .) }}
        <a class="active-page" aria-current="page" href="{{ .URL }}">{{ .Name }}</a>
      {{ else }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    {{ end }}
  </nav>
{{ end }}
