{{ define "main" }}
<div class="splash-container">
    <img src="images/splash_logo_primary.webp" alt="Tiny Roosters Logo" class="splash-logo" id="splash-logo">
    <nav class="splash-nav">
        {{ range site.Menus.main }}
            {{ if ne .URL "/" }}
                <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        {{ end }}
    </nav>
</div>
{{ end }}
