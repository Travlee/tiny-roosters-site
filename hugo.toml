baseURL = 'https://tinyroosters.com'
languageCode = 'en-us'
title = 'Tiny Roosters'
enableGitInfo = true

[taxonomies]
  tag = "tags"
  category = "categories"
  project_tag = "project_tags"

[params]
  description = "Independent game development, programming projects, and experiments by Travis Presnell."
  images = ["images/character_logo_preview.png"]

[params.analytics.umami]
  enabled = true
  url = "https://cloud.umami.is/script.js"
  website_id = "92c79604-c335-40b6-b364-a8be1019aa33"

[module]
  [module.hugoVersion]
    extended = false
    min = "0.116.0"

[markup]
  [markup.highlight]
    noClasses = false

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    url = '/'
    weight = 10
  [[menus.main]]
    name = 'Projects'
    pageRef = '/projects'
    url = '/projects'
    weight = 10
  [[menus.main]]
    name = 'Logs'
    pageRef = '/logs'
    url = '/logs'
    weight = 20
  [[menus.main]]
    name = 'History'
    pageRef = '/history'
    url = '/history'
    weight = 30
  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    url = '/about'
    weight = 40