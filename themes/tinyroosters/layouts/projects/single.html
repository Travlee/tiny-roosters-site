{{ define "main" }}

  <h1>
      <span class="title-prefix">
        <a href="{{ .Parent.RelPermalink }}"><</a>
      </span>
      {{ .Title }}
  </h1>

  {{ with .Params.header_image }}
  <div class="project-header-image">
    <img src="{{ . | relURL }}" alt="{{ $.Title }} header image">
  </div>
  {{ end }}

  <article>
    {{ .Content }}
  </article>

  {{ partial "terms.html" (dict "taxonomy" "tags" "page" .) }}
{{ end }}
