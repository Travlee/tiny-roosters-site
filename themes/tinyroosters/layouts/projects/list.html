{{ define "main" }}

  <h1>
    <span class="title-prefix"><a href="{{ .Parent.RelPermalink }}"><</a></span> {{ .Title }}
  </h1>

  <div class="projects-content">{{ .Content }}</div>

  <div class="row-container">

  {{ range where .Pages "Type" "projects" }}
  {{ $date_machine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
  {{ $date_human := .Date.Format "2006-01-02" }}

    <div class="row">
      <span class="row-arrow">🖮</span>
      <span class="row-time"><time datetime="{{ $date_machine }}">{{ $date_human }}</time></span>
      <a href="{{ .RelPermalink }}" class="row-title-link color-primary" title="{{ .Description }}">{{ .LinkTitle }}</a>
      <div class="row-desc">{{ .Description }}</div>
    </div>

  {{ end }}
  </div>

{{ end }}
