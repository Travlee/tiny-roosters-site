{{ define "main" }}

  <h1>
    <span class="title-prefix"><a href="{{ .Parent.RelPermalink }}">></a></span> {{ .Title }}
  </h1>

  <div class="project-container">
  {{ range where .Pages "Type" "projects" }}

    <p class="project-item">

      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>

      {{ with .Params.cover_image }}
        <img src="{{ . }}" alt="{{ $.Title }}" class="project-image" />
      {{ end }}

    </p>

  {{ end }}
  </div>

{{ end }}
