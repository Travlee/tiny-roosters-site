{{ define "main" }}

  <h1>
    <span class="title-prefix"><a href="{{ .Parent.RelPermalink }}">></a></span> {{ .Title }}
  </h1>

  <div class="project-container">

  {{ range where .Pages "Type" "projects" }}

    <div class="project-item">
      <h4>{{ .LinkTitle }}</h4>
      <a href="{{ .RelPermalink }}">
        <img src="{{ .Params.cover_image }}" alt="{{ .LinkTitle }}">
      </a>
    </div>

  {{ end }}
  </div>

{{ end }}
