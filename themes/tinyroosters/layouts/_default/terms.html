{{ define "main" }}
  <h1>
    <span class="title-prefix"><a href="/"><</a></span> {{ .Title }}
  </h1>

  <div class="logs-container terms-page-container">
    {{ range .Data.Terms.ByCount }}
      <div class="row">
        <a href="{{ .Page.RelPermalink }}">
          <span class="row-tag-name"><span class="color-less-contrast">#</span>{{ .Page.LinkTitle }}</span>
          <span class="row-tag-count">({{ .Count }} posts)</span>
        </a>
      </div>
    {{ end }}
  </div>
{{ end }}
